# Synced from obsidian-boiler-template. Do not edit this file directly.
name: Bug Report
description: Report a bug you encountered
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include screenshots if helpful.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Open note '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian version
      placeholder: "1.7.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other information (error messages, console logs, related issues).
